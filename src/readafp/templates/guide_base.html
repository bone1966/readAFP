<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
  <title>{% block title %}readAFP Guides{% endblock %}</title>
  <meta name="description" content="{% block description %}Guides to AFP and MO:DCA files.{% endblock %}">
  <link rel="canonical" href="https://readafp.com{% block canonical %}/guide{% endblock %}">
  <meta property="og:type" content="article">
  <meta property="og:title" content="{{ self.title() }}">
  <meta property="og:description" content="{{ self.description() }}">
  <meta property="og:image" content="https://readafp.com/static/og.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="https://readafp.com/static/og.png">
  {% block jsonld %}{% endblock %}
  <style>
    :root {
      --bg: #12141d; --panel: #1a1d29; --card: #232737; --border: #313650;
      --text: #e4e6f0; --dim: #9aa0b8; --accent: #26c6da;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; background: var(--bg); color: var(--text);
      font-family: "Segoe UI", system-ui, Arial, sans-serif; line-height: 1.65;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    header.site {
      display: flex; align-items: center; gap: 10px; padding: 14px 24px;
      border-bottom: 1px solid var(--border); background: var(--panel);
    }
    header.site .brand { font-weight: 700; font-size: 1.1rem; color: var(--text); }
    header.site .beta {
      font-size: 0.6rem; font-weight: 700; letter-spacing: 0.06em;
      text-transform: uppercase; color: #06222a; background: var(--accent);
      padding: 1px 7px; border-radius: 9px;
    }
    header.site .spacer { flex: 1; }
    header.site nav a { color: var(--dim); margin-left: 18px; font-size: 0.92rem; }
    main { max-width: 760px; margin: 0 auto; padding: 28px 24px 64px; }
    .crumbs { font-size: 0.85rem; color: var(--dim); margin-bottom: 14px; }
    h1 { font-size: 2rem; line-height: 1.25; margin: 0 0 6px; }
    h2 { font-size: 1.3rem; margin: 32px 0 8px; }
    p, li { color: #cdd1e4; }
    table { border-collapse: collapse; width: 100%; margin: 14px 0; font-size: 0.95rem; }
    th, td { border: 1px solid var(--border); padding: 8px 10px; text-align: left; }
    th { background: var(--card); color: var(--text); }
    code { background: var(--card); padding: 1px 6px; border-radius: 5px;
           font-size: 0.9em; color: #aee9f2; }
    pre { background: var(--card); border: 1px solid var(--border);
          border-radius: 10px; padding: 14px 16px; overflow-x: auto;
          margin: 14px 0; }
    pre code { background: none; padding: 0; color: #d7dbef;
               font-size: 0.88rem; line-height: 1.5; }
    .cta {
      display: block; margin: 30px 0; padding: 18px 22px; border-radius: 12px;
      background: linear-gradient(120deg, #1a3d44, #1a1d29);
      border: 1px solid var(--accent); color: var(--text); font-size: 1.05rem;
    }
    .cta strong { color: var(--accent); }
    .related { margin-top: 40px; border-top: 1px solid var(--border); padding-top: 18px; }
    .related h2 { font-size: 1rem; color: var(--dim); margin-top: 0; }
    .related ul { padding-left: 18px; }
    .card-list { list-style: none; padding: 0; }
    .card-list li {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 16px 18px; margin-bottom: 14px;
    }
    .card-list h2 { margin: 0 0 4px; font-size: 1.15rem; }
    .card-list p { margin: 0; color: var(--dim); font-size: 0.95rem; }
    footer.site {
      max-width: 760px; margin: 0 auto; padding: 24px; color: var(--dim);
      font-size: 0.85rem; border-top: 1px solid var(--border);
    }
  </style>
</head>
<body>
  <header class="site">
    <a class="brand" href="/">readAFP 🔍</a><span class="beta">Beta</span>
    <span class="spacer"></span>
    <nav><a href="/">Open a file</a><a href="/private">Run privately</a><a href="/guide">Guides</a></nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
  <footer class="site">
    <a href="/">readAFP</a> — free, in-browser AFP / MO:DCA file viewer &amp; inspector.
  </footer>
</body>
</html>
